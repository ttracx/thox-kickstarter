name: Deploy Kickstarter preview to GitHub Pages

# Publishes the self-contained campaign site bundle (kickstarter/site/) as a
# full public preview at https://<owner>.github.io/thox-kickstarter/
#
# One-time setup: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that this deploys automatically on every
# push to main that touches the bundle (and can be run manually).

on:
  push:
    branches: [main]
    paths:
      - 'kickstarter/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Disable Jekyll processing
        run: touch kickstarter/site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: kickstarter/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
