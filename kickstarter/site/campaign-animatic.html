<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#050506">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <rect x="38" y="26" width="44" height="28" rx="4" fill="none" stroke="#34D399" stroke-width="3"/>
    <path d="M56 33 L67 40 L56 47 Z" fill="#34D399"/>
  </svg>
</template>
<x-dc>
<helmet>
  <style>
    @font-face { font-family: 'Xolonium'; src: url('assets/fonts/xolonium-regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Xolonium'; src: url('assets/fonts/xolonium-bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    html, body { margin: 0; padding: 0; height: 100%; background: #050506; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:ital,wght@0,400;0,500;0,600;1,400&amp;display=swap" rel="stylesheet">
  <meta name="ext-resource-dependency" content="animations.jsx">
  <meta name="ext-resource-dependency" content="animatic-scenes.jsx">
  <meta name="ext-resource-dependency" content="assets/video/thoxkey-closeup.mp4">
  <meta name="ext-resource-dependency" content="assets/video/thoxmini-air-closeup.mp4">
  <meta name="ext-resource-dependency" content="assets/video/thoxmini-closeup.mp4">
  <meta name="ext-resource-dependency" content="assets/video/thoxclip-closeup.mp4">
</helmet>
<div data-screen-label="Campaign Animatic" style="position: fixed; inset: 0; display: flex; flex-direction: column; background: #050506;">
  <div style="display: flex; align-items: center; gap: 24px; height: 44px; padding: 0 20px; border-bottom: 1px solid #27272a; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: #a1a1aa; flex: none;">
    <span style="color: #fafafa; font-weight: 700;">THOX<span style="color: #34d399;">.AI</span> / KS-FILM-2026</span>
    <span>90-SECOND ANIMATIC / REV V2</span>
    <span style="color: #71717a;">SOURCE: PRODUCTION STORYBOARD / 13 SEQ</span>
    <span style="margin-left: auto; color: #34d399;">EXPORT: SHARE &middot; EXPORT &middot; VIDEO</span>
    <span style="color: #71717a;">1920&times;1080 / 90S</span>
  </div>
  <div style="flex: 1; min-height: 0; position: relative;">
    <x-import component-from-global-scope="CampaignAnimatic" from="./animations.jsx ./animatic-scenes.jsx" burn-ins="{{ burnIns }}" loop="{{ loopPlayback }}" hint-size="100%,100%"></x-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;burnIns&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Player&quot;}, &quot;loopPlayback&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Player&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      burnIns: this.props.burnIns ?? true,
      loopPlayback: this.props.loopPlayback ?? true,
    };
  }
}
</script>
</body>
</html>
