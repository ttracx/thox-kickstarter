<div id="root"></div>
<script>
/* Standalone: rewrite string-referenced asset URLs to bundled blob URLs at runtime. */
(function(){
  function patch(){
    if (!window.__resources) return;
    document.querySelectorAll('img[src="assets/thox-icon-green.png"]').forEach(function(img){
      img.src = window.__resources.thoxIconGreen;
    });
  }
  new MutationObserver(patch).observe(document.body, {subtree:true, childList:true});
  patch();
})();
</script>
