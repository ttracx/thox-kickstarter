<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THOX.ai · Kickstarter Key Visual</title>
<link rel="stylesheet" href="assets/colors_and_type.css" />
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="keyvisual.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="hero" title="THOX.ai · Project Key Visual"
        subtitle="Kickstarter discovery hero. Privacy first edge AI on hardware you own.">
        <DCArtboard id="primary" label="01 · Primary key visual · 1920×1080" width={1920} height={1080}>
          <KVScene mode="full" />
        </DCArtboard>
        <DCArtboard id="plate" label="03 · Text-free background plate · 1920×1080" width={1920} height={1080}>
          <KVScene mode="plate" />
        </DCArtboard>
      </DCSection>

      <DCSection id="variants" title="Crops and safe checks"
        subtitle="Same composition validated for thumbnail and social reuse.">
        <DCArtboard id="square" label="04 · Square crop · 1080×1080" width={1080} height={1080}>
          <KVSquare />
        </DCArtboard>
        <DCArtboard id="thumb" label="02 · Thumbnail safe check · 320×180" width={320} height={180}>
          <KVThumb />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
